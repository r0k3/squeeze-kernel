name: Publish to PyPI

# Publishes on every GitHub release (create a release from a v* tag).
# Uses PyPI Trusted Publishing (OIDC) — no API token secrets required.
# One-time setup on PyPI: project "squeeze-kernel" -> Publishing ->
# add GitHub publisher (owner: r0k3, repo: squeeze-kernel,
# workflow: publish.yml, environment: pypi).

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Build distributions
        run: uv build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/squeeze-kernel
    permissions:
      id-token: write   # required for PyPI Trusted Publishing

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
